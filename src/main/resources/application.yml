spring:
  application:
    name: distributed-lock-demo

  # PostgreSQL (running in Docker)
  datasource:
    url: jdbc:postgresql://localhost:5432/lockdemo
    username: demo
    password: demo123
    # optional: spring boot automatically detects this from the URL
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate # It runs a startup check that every @Entity class has a matching table with the right columns and types in the database

  data:
    redis:
      host: localhost
      port: 6379